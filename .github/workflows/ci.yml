name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: read-only test runs. GITHUB_TOKEN gets no write to
# anything (contents, packages, issues, PRs, actions). The npm publish
# flow lives in publish.yml with its own scoped permissions.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
