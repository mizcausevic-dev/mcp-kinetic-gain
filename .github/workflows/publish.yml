name: Publish to npm

# Triggered on tag pushes matching v*. The convention is:
#   1. Bump version in package.json + CHANGELOG.md
#   2. git commit
#   3. git tag vX.Y.Z
#   4. git push && git push --tags
# This workflow then runs the test suite, verifies the tag matches the
# package.json version, and publishes to npm with provenance.

on:
  push:
    tags:
      - 'v*'

# npm provenance requires id-token: write so the GitHub OIDC token can be
# minted and submitted to Sigstore as the attestation subject.
# contents: write is required to attach SBOM artifact to the GitHub Release.
permissions: read-all

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag v${tag_version} does not match package.json version ${pkg_version}."
            echo "Bump package.json to ${tag_version} before tagging, or retag with v${pkg_version}."
            exit 1
          fi
          echo "Tag v${tag_version} matches package.json. Proceeding."

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Generate CycloneDX SBOM
        run: |
          # CycloneDX 1.5 SBOM for the published mcp-kinetic-gain artifact.
          # Captures the dep tree (with TypeScript compiler + MCP SDK at the
          # top of the chain) for downstream auditors.
          mkdir -p sbom
          npm sbom --sbom-format cyclonedx --sbom-type library > sbom/cyclonedx.json
          node -e "const s=require('./sbom/cyclonedx.json'); console.log('SBOM:', s.bomFormat, s.specVersion, '·', (s.components||[]).length, 'components');"

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Attach SBOM to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" sbom/cyclonedx.json --clobber
          else
            gh release create "$TAG" sbom/cyclonedx.json --title "$TAG" --notes "See CHANGELOG.md. SBOM attached (CycloneDX 1.5)."
          fi
