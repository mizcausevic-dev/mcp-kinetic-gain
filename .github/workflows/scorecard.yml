name: OpenSSF Scorecard

# Automated security posture scoring against the OpenSSF Scorecard ruleset:
#   https://github.com/ossf/scorecard
#
# Score appears in the GitHub Security tab + can be embedded as a badge.
# Catches regressions in: dangerous workflows, missing branch protection,
# unpinned actions, missing fuzzing, weak deps, exposed secrets, etc.
#
# Runs:
#   - Weekly Saturday cron (results stay fresh)
#   - On any push to main (catches just-shipped regressions)
#   - On PRs targeting main (catches regressions before merge)

on:
  branch_protection_rule:
  schedule:
    # Saturday 13:00 UTC — between European EOW + US start-of-day
    - cron: "0 13 * * 6"
  push:
    branches: [main]

# Scorecard needs:
#   - read repo contents + metadata
#   - write security events (publishes findings to GH Code Scanning)
#   - read-only ID token for OIDC signing of the result (no secrets needed)
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@13ec8c77e8a5dae7e0a0d47bde3e3004df15d34f  # v2
        continue-on-error: true  # tolerate transient GH code-search 429s / upstream Sigstore-TUF signing failures
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results: false avoids depending on the public Sigstore
          # transparency-log signing step (Fulcio/TUF), which has been
          # failing upstream with "tuf: invalid key". Score is still
          # computed and uploaded to the repo's own Security tab via SARIF.
          publish_results: false

      - name: Upload SARIF (so Security tab shows findings)
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3
        with:
          sarif_file: results.sarif

      - name: Upload artifact (so the raw JSON is downloadable from the run)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 30
